<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Singing Coach</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🎤 AI Singing Coach</h1>
  <p>Sing and get real feedback</p>

  <button onclick="start()">Start Singing</button>
  <button onclick="stop()">Stop</button>

  <div class="card">
    <h2 id="status">Ready</h2>
    <p id="note">Detected Note: -</p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
